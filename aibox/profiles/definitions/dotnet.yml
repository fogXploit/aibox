# .NET Development Profile
# Provides the .NET SDK from the Microsoft apt repository for Debian 12
# Note: 8.0 and 9.0 reach end of support on 2026-11-10; 10.0 is LTS until Nov 2028

name: dotnet
description: .NET development with the Microsoft .NET SDK
versions:
  - "8.0"
  - "9.0"
  - "10.0"
default_version: "10.0"
package_manager: nuget

system_dependencies:
  - wget
  - ca-certificates

install_commands: []

env_vars:
  DOTNET_VERSION: "${VERSION}"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

docker_layers:
  - "RUN wget -q https://packages.microsoft.com/config/debian/12/packages-microsoft-prod.deb"
  - "RUN dpkg -i packages-microsoft-prod.deb && rm packages-microsoft-prod.deb"
  - "RUN apt-get update && apt-get install -y --no-install-recommends dotnet-sdk-${VERSION} && rm -rf /var/lib/apt/lists/*"

post_install:
  - "dotnet --version"
